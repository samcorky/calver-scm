name: PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  label:
    name: Apply pull request labels
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels from changed files
        uses: actions/labeler@v6.0.1
        with:
          sync-labels: true
